name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-python:
    name: Build Python (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: app/python
    env:
      PYTHONPATH: src
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            artifact_name: t7oolkit-python-windows
          - os: macos-latest
            platform: macos
            artifact_name: t7oolkit-python-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/python/requirements*.txt

      - name: Build release package
        run: python scripts/build.py --clean --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: app/python/dist/release/*.zip
          if-no-files-found: error

  build-tauri:
    name: Build Tauri (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            artifact_name: t7oolkit-tauri-windows
          - os: macos-latest
            platform: macos
            artifact_name: t7oolkit-tauri-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/tauri/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/tauri/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: app/tauri
        run: npm ci

      - name: Build Tauri app
        working-directory: app/tauri
        run: npm run tauri build

      - name: Collect release bundles
        shell: bash
        run: |
          mkdir -p app/tauri/dist/release
          if [ "${{ matrix.platform }}" = "macos" ]; then
            cp app/tauri/src-tauri/target/release/bundle/dmg/*.dmg app/tauri/dist/release/
          else
            cp app/tauri/src-tauri/target/release/bundle/nsis/*-setup.exe app/tauri/dist/release/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: app/tauri/dist/release/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-python, build-tauri]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
