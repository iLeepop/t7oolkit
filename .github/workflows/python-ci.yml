name: Python CI

on:
  push:
    paths:
      - "app/python/**"
      - ".github/workflows/python-ci.yml"
      - ".github/workflows/release.yml"
  pull_request:
    paths:
      - "app/python/**"
      - ".github/workflows/python-ci.yml"
      - ".github/workflows/release.yml"

defaults:
  run:
    working-directory: app/python

env:
  PYTHONPATH: src

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/python/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Compile sources
        run: python -m compileall -q src/t7oolkit

      - name: Verify package metadata
        run: python -c "import t7oolkit; print(t7oolkit.__version__)"

      - name: Verify tool registry
        run: python -c "from t7oolkit.tools.register import register_all_tools; from t7oolkit.registry.tool_registry import registry; register_all_tools(); assert len(registry.list_tools()) >= 2"
